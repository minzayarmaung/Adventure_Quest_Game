name: Build Windows EXE Release

on:
  push:
    tags:
      - 'v1.0'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Package Executable with jpackage
        run: |
          jpackage --input Main/out/artifacts/Main_jar `
                   --name "AdventureQuest" `
                   --main-jar Main.jar `
                   --type exe `
                   --win-shortcut `
                   --win-menu

      - name: Upload Windows EXE Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdventureQuest-Windows-Installer
          path: AdventureQuest-*.exe